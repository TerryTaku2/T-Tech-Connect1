<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Tech Connect | Messages</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/landlord.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="chat-body">

<!-- Topbar (shared) -->
<header class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="{{ '/landlord' if user_role == 'landlord' else '/dashboard' }}" class="logo-wrap">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#1e40af"/>
          <path d="M8 14h24M8 20h16M8 26h20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="30" cy="26" r="5" fill="white"/>
          <path d="M28 26l1.5 1.5L32 24" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">T-Tech Connect</span>
    </a>
  </div>
  <div class="topbar-right">
    <div class="user-pill">
      <div class="user-avatar">{{ user_name[0].upper() if user_name else 'U' }}</div>
      <div class="user-info">
        <span class="user-name-text">{{ user_name }}</span>
        <span class="role-badge role-{{ user_role }}">{{ user_role|title }}</span>
      </div>
    </div>
    <a href="/logout" class="btn-logout" title="Logout">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="logout-label">Logout</span>
    </a>
  </div>
</header>

<!-- Chat shell -->
<div class="chat-shell">

  <!-- Left: Conversation list -->
  <aside class="conv-panel" id="conv-panel">

    <div class="conv-panel-header">
      <h2 class="conv-panel-title">Messages</h2>
      <div class="conv-search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="conv-search" class="conv-search" placeholder="Search conversations…" />
      </div>
    </div>

    <div class="conv-list" id="conv-list">
      <div class="conv-list-loading">
        <div class="dot-spin"><span></span><span></span><span></span></div>
      </div>
    </div>

  </aside>

  <!-- Right: Message thread -->
  <section class="thread-panel" id="thread-panel">

    <!-- Empty state -->
    <div class="thread-empty" id="thread-empty">
      <div class="thread-empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h3>Your Messages</h3>
      <p>Select a conversation on the left, or start one from a property listing.</p>
    </div>

    <!-- Active thread (hidden until a conv is selected) -->
    <div class="thread-active" id="thread-active" style="display:none">

      <!-- Thread header -->
      <div class="thread-header" id="thread-header">
        <button class="back-btn" id="back-btn" title="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="thread-avatar" id="thread-avatar">?</div>
        <div class="thread-contact-info">
          <div class="thread-contact-name" id="thread-contact-name">—</div>
          <div class="thread-contact-sub" id="thread-contact-sub"></div>
        </div>
        <div class="thread-header-actions">
          <a class="thread-prop-link" id="thread-prop-link" style="display:none" title="View Property">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            View Property
          </a>
        </div>
      </div>

      <!-- Messages area -->
      <div class="messages-area" id="messages-area">
        <div class="messages-loading" id="messages-loading">
          <div class="dot-spin"><span></span><span></span><span></span></div>
        </div>
        <div class="messages-list" id="messages-list"></div>
        <div class="typing-indicator" id="typing-indicator" style="display:none">
          <div class="typing-bubble">
            <span></span><span></span><span></span>
          </div>
          <span class="typing-label" id="typing-label">typing…</span>
        </div>
      </div>

      <!-- Input bar -->
      <div class="input-bar">
        <textarea
          id="msg-input"
          class="msg-textarea"
          placeholder="Type a message…"
          rows="1"
          maxlength="2000"
        ></textarea>
        <button class="send-btn" id="send-btn" title="Send" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

    </div>
  </section>

</div>

<!-- Inject server-side data -->
<script>
  window.CURRENT_USER_ID   = {{ current_user_id }};
  window.CURRENT_USER_NAME = {{ user_name | tojson }};
  window.OPEN_CONV_ID      = {{ open_conv | tojson if open_conv else 'null' }};
</script>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
