<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Tech Connect | Set New Password</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .strength-bar-wrap { margin-top: .5rem; }
    .strength-bar-track { height: 4px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .strength-bar-fill  { height: 100%; width: 0; border-radius: 99px; transition: width .3s, background .3s; }
    .strength-label     { font-size: .75rem; color: #64748b; margin-top: .3rem; }
  </style>
</head>
<body>

  <div class="bg-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <div class="login-container login-container--centered">
    <div class="form-panel" style="max-width:480px;width:100%">
      <div class="form-container">

        <div class="back-link-wrap">
          <a href="/login" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            Back to login
          </a>
        </div>

        <div class="form-header">
          <div class="icon-wrap-large">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h2 class="form-title">Set a new password</h2>
          <p class="form-sub">Choose a strong password for your account.</p>
        </div>

        {% if error %}
        <div class="alert alert-error" style="margin-bottom:1rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ error }}
        </div>
        {% endif %}

        <div class="alert" id="js-alert" style="display:none;"></div>

        <form method="POST" action="/reset-password/{{ token }}" id="reset-form" novalidate>
          <!-- New password -->
          <div class="field-group" id="pw-group">
            <label class="field-label" for="password">New password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="password" name="password" class="field-input"
                     placeholder="At least 8 characters" autocomplete="new-password" required />
              <button type="button" class="toggle-pwd" onclick="toggleVis('password', this)" tabindex="-1" aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="strength-bar-wrap">
              <div class="strength-bar-track"><div class="strength-bar-fill" id="strength-fill"></div></div>
              <div class="strength-label" id="strength-label"></div>
            </div>
            <span class="field-error" id="pw-error"></span>
          </div>

          <!-- Confirm password -->
          <div class="field-group" id="pw2-group">
            <label class="field-label" for="confirm_password">Confirm password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="confirm_password" name="confirm_password" class="field-input"
                     placeholder="Repeat password" autocomplete="new-password" required />
              <button type="button" class="toggle-pwd" onclick="toggleVis('confirm_password', this)" tabindex="-1" aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="pw2-error"></span>
          </div>

          <button type="submit" class="btn-submit" id="btn-submit">
            <span class="btn-text">Update password</span>
            <span class="btn-spinner" style="display:none">
              <svg class="spinner-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
              Updating…
            </span>
          </button>
        </form>

      </div>
    </div>
  </div>

<script>
  /* Toggle password visibility */
  function toggleVis(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  /* Password strength meter */
  const pwInput = document.getElementById('password');
  const fill    = document.getElementById('strength-fill');
  const lbl     = document.getElementById('strength-label');

  pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    let score = 0;
    if (v.length >= 8)               score++;
    if (v.length >= 12)              score++;
    if (/[A-Z]/.test(v))            score++;
    if (/[0-9]/.test(v))            score++;
    if (/[^A-Za-z0-9]/.test(v))     score++;

    const levels = [
      { pct: '0%',   bg: 'transparent', text: '' },
      { pct: '20%',  bg: '#ef4444',     text: 'Very weak' },
      { pct: '40%',  bg: '#f97316',     text: 'Weak' },
      { pct: '60%',  bg: '#eab308',     text: 'Fair' },
      { pct: '80%',  bg: '#22c55e',     text: 'Strong' },
      { pct: '100%', bg: '#16a34a',     text: 'Very strong' },
    ];
    const lvl = levels[score] || levels[0];
    fill.style.width      = lvl.pct;
    fill.style.background = lvl.bg;
    lbl.textContent       = lvl.text;
  });

  /* Client-side validation before submit */
  document.getElementById('reset-form').addEventListener('submit', function(e) {
    let ok = true;
    const pw  = document.getElementById('password').value;
    const pw2 = document.getElementById('confirm_password').value;
    const pwErr  = document.getElementById('pw-error');
    const pw2Err = document.getElementById('pw2-error');

    pwErr.textContent  = '';
    pw2Err.textContent = '';

    if (pw.length < 8) {
      pwErr.textContent = 'Password must be at least 8 characters.';
      ok = false;
    }
    if (pw !== pw2) {
      pw2Err.textContent = 'Passwords do not match.';
      ok = false;
    }

    if (!ok) { e.preventDefault(); return; }

    /* Show spinner */
    document.getElementById('btn-submit').querySelector('.btn-text').style.display   = 'none';
    document.getElementById('btn-submit').querySelector('.btn-spinner').style.display = 'flex';
  });
</script>

</body>
</html>
