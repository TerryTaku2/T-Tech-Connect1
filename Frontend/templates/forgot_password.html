<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Tech Connect | Forgot Password</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
  {% include '_pwa.html' %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <div class="login-container login-container--centered">
    <div class="form-panel" style="max-width:480px;width:100%">
      <div class="form-container">

        <div class="back-link-wrap">
          <a href="/login" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            Back to login
          </a>
        </div>

        <div class="form-header">
          <div class="icon-wrap-large">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h2 class="form-title">Reset your password</h2>
          <p class="form-sub">Enter your email and we'll send you a reset link.</p>
        </div>

        <div class="alert" id="js-alert" style="display:none;"></div>

        <form id="forgot-form" novalidate>
          <div class="field-group" id="email-group">
            <label class="field-label" for="email">Email address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </span>
              <input type="email" id="email" name="email" class="field-input" placeholder="you@ttech.ac.zw" autocomplete="email" required />
            </div>
            <span class="field-error" id="email-error"></span>
          </div>

          <button type="submit" class="btn-submit" id="btn-submit">
            <span class="btn-text">Send reset link</span>
            <span class="btn-spinner" style="display:none">
              <svg class="spinner-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
              Sending…
            </span>
          </button>
        </form>

      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/forgot.js') }}"></script>
</body>
</html>
