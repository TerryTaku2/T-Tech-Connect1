<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Connection | T-Tech Connect</title>
  <link rel="icon" type="image/png" href="/static/images/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
    }
    .logo { height: 72px; width: auto; margin-bottom: 1.75rem; }
    .icon-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: #eff6ff;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      color: #1d4ed8;
    }
    h1 { font-size: 1.4rem; font-weight: 700; color: #111827; margin-bottom: .6rem; }
    p  { font-size: .95rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.75rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .75rem 1.75rem;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
    }
    .btn:hover { background: #1e3a8a; }
    .status {
      margin-top: 1.5rem;
      font-size: .82rem;
      color: #9ca3af;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: .35rem;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/static/images/logo.png" alt="T-Tech Connect" class="logo" />

    <div class="icon-wrap">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>T-Tech Connect can't reach the internet right now. Check your connection and try again — your cached pages are still available.</p>

    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Try Again
    </button>

    <p class="status">
      <span class="dot"></span>No internet connection
    </p>
  </div>

  <script>
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
