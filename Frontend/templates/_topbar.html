<header class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="{% if user_role == 'admin' %}/admin{% elif user_role == 'landlord' %}/landlord{% else %}/dashboard{% endif %}" class="logo-wrap">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="T-Tech Connect" class="logo-img" />
    </a>
  </div>
  <div class="topbar-right">
    <button id="pwa-install-btn" onclick="triggerPwaInstall()" title="Install App">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Install App
    </button>
    <div class="user-pill">
      <div class="user-avatar">{{ user_name[0].upper() if user_name else 'L' }}</div>
      <div class="user-info">
        <span class="user-name-text">{{ user_name }}</span>
        {% set role_label = {'student': 'Tenant', 'landlord': 'Landlord', 'admin': 'Admin'} %}
        <span class="role-badge role-{{ user_role }}">{{ role_label.get(user_role, user_role|title) }}</span>
      </div>
    </div>
    <a href="/logout" class="btn-logout" title="Logout">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="logout-label">Logout</span>
    </a>
  </div>
</header>
