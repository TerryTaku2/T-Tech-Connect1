<header class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="/landlord" class="logo-wrap">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#1e40af"/>
          <path d="M8 14h24M8 20h16M8 26h20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="30" cy="26" r="5" fill="white"/>
          <path d="M28 26l1.5 1.5L32 24" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">T-Tech Connect</span>
    </a>
  </div>
  <div class="topbar-right">
    <div class="user-pill">
      <div class="user-avatar">{{ user_name[0].upper() if user_name else 'L' }}</div>
      <div class="user-info">
        <span class="user-name-text">{{ user_name }}</span>
        <span class="role-badge role-{{ user_role }}">{{ user_role|title }}</span>
      </div>
    </div>
    <a href="/logout" class="btn-logout" title="Logout">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="logout-label">Logout</span>
    </a>
  </div>
</header>
